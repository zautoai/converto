version: '3.8'

services:
  base:
    image: ghcr.io/zautoai/converto:demo-base
    networks:
      - converto-network
    volumes:
      - app_uploads:/usr/src/uploads
      - app_images:/usr/src/public/images
    ports:
      - "3030:3000"
    depends_on:
      - redis
    restart: always  # Restart policy for the Node app.

  crm:
    image: ghcr.io/zautoai/converto:demo-crm
    networks:
      - converto-network
    ports:
      - "3031:3001"
    restart: always

  redis:
    image: redis:latest
    command: redis-server --requirepass REDIS_PASSWORD_PLACEHOLDER
    networks:
      - converto-network
    expose:
      - "6379"
    volumes:
      - redis_vol:/data
    restart: always

networks:
  converto-network:
    driver: bridge

volumes:
  redis_vol:
    driver: local
  app_uploads:
    driver: local
  app_images:
    driver: local
