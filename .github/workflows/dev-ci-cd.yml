on:
  push:
    branches: [ dev ]
    paths:
      - 'base/**'
      - 'crm/**'



jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ secrets.DEV_GITHUB_USER }}
        password: ${{ secrets.DEV_GITHUB_TOKEN }}
    - name: Build and push Docker image for base
      if: contains(github.event.head_commit.message, 'base')
      uses: docker/build-push-action@v2
      with:
        push: true
        context: ./base
        file: ./base/Dockerfile
        tags: |
          ghcr.io/zautoai/converto:dev-base${{ github.sha }}
          ghcr.io/zautoai/converto:dev-base
        build-args: |
          APOLLO_API_KEY=${{ secrets.DEV_APOLLO_API_KEY }}
          AWS_ACCESS_KEY_ID=${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          AWS_REGION=${{ secrets.DEV_AWS_REGION }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          CHROMA_AUTH_CREDENTIALS=${{ secrets.DEV_CHROMA_AUTH_CREDENTIALS }}
          CHROMA_AUTH_PROVIDER=${{ secrets.DEV_CHROMA_AUTH_PROVIDER }}
          CHROMA_URL=${{ secrets.DEV_CHROMA_URL }}
          CHUNCK_SIZE=${{ secrets.DEV_CHUNCK_SIZE }}
          CLAUDE_API_KEY=${{ secrets.DEV_CLAUDE_API_KEY }}
          COHERE_API_KEY=${{ secrets.DEV_COHERE_API_KEY }}
          CONVERTO_EMAIL=${{ secrets.DEV_CONVERTO_EMAIL }}
          CONVERTO_TRAIN_BUCKET_NAME=${{ secrets.DEV_CONVERTO_TRAIN_BUCKET_NAME }}
          COVERTO_PIC_BUCKET_NAME=${{ secrets.DEV_COVERTO_PIC_BUCKET_NAME }}
          CRYPTO_ENCRYPTION_SECRET=${{ secrets.DEV_CRYPTO_ENCRYPTION_SECRET }}
          DATABASE_URL=${{ secrets.DEV_DATABASE_URL_BASE }}
          EMBEDDING_PROVIDER=${{ secrets.DEV_EMBEDDING_PROVIDER }}
          GITHUB_TOKEN=${{ secrets.DEV_GITHUB_TOKEN }}
          GITHUB_USER=${{ secrets.DEV_GITHUB_USER }}
          GOOGLE_CLIENT_ID=${{ secrets.DEV_GOOGLE_CLIENT_ID }}
          HOST_PORT=${{ secrets.DEV_HOST_PORT }}
          HOST_URL=${{ secrets.DEV_HOST_URL }}
          IP_DATA_KEY=${{ secrets.DEV_IP_DATA_KEY }}
          JWT_SECRET=${{ secrets.DEV_JWT_SECRET }}
          LLM_PROVIDER=${{ secrets.DEV_LLM_PROVIDER }}
          MAX_SMTP_CONNECTIONS=${{ secrets.DEV_MAX_SMTP_CONNECTIONS }}
          MAX_TOTAL_FILE_SIZE=${{ secrets.DEV_MAX_TOTAL_FILE_SIZE }}
          NAME=${{ secrets.DEV_NAME }}
          NODE_ENV=${{ secrets.DEV_NODE_ENV }}
          OPENAI_API_KEY=${{ secrets.DEV_OPENAI_API_KEY }}
          OPENAI_ASSISTANT_DEFAULT_MODEL=${{ secrets.DEV_OPENAI_ASSISTANT_DEFAULT_MODEL }}
          OPEN_AI_EMBEDDING_MODEL=${{ secrets.DEV_OPEN_AI_EMBEDDING_MODEL }}
          OPEN_AI_MODEL=${{ secrets.DEV_OPEN_AI_MODEL }}
          QUICK_MAIL_VALIDATOR_API=${{ secrets.DEV_QUICK_MAIL_VALIDATOR_API }}
          REDIS_IP=${{ secrets.DEV_REDIS_IP }}
          REDIS_PASSWORD=${{ secrets.DEV_REDIS_PASSWORD }}
          REDIS_PORT=${{ secrets.DEV_REDIS_PORT }}
          SENDGRID_KEY=${{ secrets.DEV_SENDGRID_KEY }}
          SERVER_HOST=${{ secrets.DEV_SERVER_HOST }}
          SERVER_SSH_KEY=${{ secrets.DEV_SERVER_SSH_KEY }}
          SERVER_USER=${{ secrets.DEV_SERVER_USER }}
          SIGNUP_ALERT_MAIL=${{ secrets.DEV_SIGNUP_ALERT_MAIL }}
          SUPER_USER_EMAIL=${{ secrets.DEV_SUPER_USER_EMAIL }}
          SUPER_user=${{ secrets.DEV_SUPER_user }}
          SUPER_USER_PASSWORD=${{ secrets.DEV_SUPER_USER_PASSWORD }}
          TRAINING_CONTENT_PATH=${{ secrets.DEV_TRAINING_CONTENT_PATH }}
          UPLOADS_FOLDER=${{ secrets.DEV_UPLOADS_FOLDER }}
          VERIFICATION_EXPIRES_IN=${{ secrets.DEV_VERIFICATION_EXPIRES_IN }}
          ZAUTO_API_BASE_URL=${{ secrets.DEV_ZAUTO_API_BASE_URL }}

    - name: Build and push Docker image for crm
      if: contains(github.event.head_commit.message, 'crm')
      uses: docker/build-push-action@v2
      with:
        push: true
        context: ./crm
        file: ./crm/Dockerfile
        tags: |
          ghcr.io/zautoai/converto:dev-crm${{ github.sha }}
          ghcr.io/zautoai/converto:dev-crm
        build-args: |
          REDIS_IP=${{ secrets.DEV_REDIS_IP }}
          REDIS_PASSWORD=${{ secrets.DEV_REDIS_PASSWORD }}
          REDIS_PORT=${{ secrets.DEV_REDIS_PORT }}
          CRM_ACCESS_TOKEN=${{ secrets.DEV_CRM_ACCESS_TOKEN }}
          CRM_API_PORT=${{ secrets.DEV_CRM_API_PORT }}
          CRM_BASE_URL=${{ secrets.DEV_CRM_BASE_URL }}
          CRM_DATABASE_URL=${{ secrets.DEV_CRM_DATABASE_URL }}
          CRM_HOST=${{ secrets.DEV_CRM_HOST }}
          CRM_HOST_PORT=${{ secrets.DEV_CRM_HOST_PORT }}
          CRM_JWT_SECRET=${{ secrets.DEV_CRM_JWT_SECRET }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - uses: actions/checkout@v2
    - name: Insert Redis Password
      run: |
        sed -i'' -e "s|REDIS_PASSWORD_PLACEHOLDER|${{ secrets.DEV_REDIS_PASSWORD }}|g" docker-compose.yml

    - name: Show Updated Docker Compose File
      run: cat docker-compose.yml
    - name: Copy Updated Docker Compose File to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        source: "docker-compose.yml"
        target: "/home/dbserver/converto/"
    - name: Deploy to Local Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        script: |
          set -x  # Enable debugging
          docker login ghcr.io -u ${{ secrets.DEV_GITHUB_USER }} -p ${{ secrets.DEV_GITHUB_TOKEN }}        
          cd /home/dbserver/converto
          cat docker-compose.yml
          docker-compose pull
          docker-compose up -d
          docker image prune -a -f
    - name: Check Health of test Redis Container
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        script: |
          set -x
          REDIS_CONTAINER="converto-redis-1"
          REDIS_PASSWORD=${{ secrets.DEV_REDIS_PASSWORD }}
          REDIS_HEALTH=$(docker exec $REDIS_CONTAINER redis-cli -a $REDIS_PASSWORD PING)
          if [ "$REDIS_HEALTH" != "PONG" ]; then
          echo "Redis container $REDIS_CONTAINER is not healthy😭"
          exit 1
          else
          echo "Redis container $REDIS_CONTAINER is healthy😂"
          fi

    - name: Check Health of Base Application Container
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        script: |
          BASE_APP_CONTAINER="converto-base-1"
          HEALTH_CHECK_URL="http://localhost:3000/health"
          if curl --fail $HEALTH_CHECK_URL; then
          echo "Container $BASE_APP_CONTAINER is healthy"
          else
          echo "Container $BASE_APP_CONTAINER is not healthy😭"
          exit 1
          fi

    - name: Check Health of CRM Application Container
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        script: |
          CRM_APP_CONTAINER="converto-crm-1"
          HEALTH_CHECK_URL="http://localhost:3001/api/v1/ping"
          if curl --fail $HEALTH_CHECK_URL; then
          echo "Container $CRM_APP_CONTAINER is healthy"
          else
          echo "Container $CRM_APP_CONTAINER is not healthy😭"
          exit 1
          fi
    - name: Deployment Success Message
      run: echo "Deployment completed successfully!🎉😂
