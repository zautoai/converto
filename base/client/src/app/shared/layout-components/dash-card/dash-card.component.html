
<ng-container *ngIf="showLoader">
    <ngx-skeleton-loader count="1" [theme]="{'border-radius': '10px', height: '140px'}"></ngx-skeleton-loader>
</ng-container>
<ng-container *ngIf="!showLoader">
    <div class="card bg-gradient-{{color}} position-relative shadow" *ngIf="cardType == type.default">
        <div class="card-body">
            <img src="assets/images/dashboard/circle.svg" class="card-img-abs" alt="circle-image">
            <h3 class="card-title text-light">{{title}} <i class="fe fe-{{icon}} mb-0"></i></h3>
            <h3 class="d-inline-block mb-2 number-font text-light"><span [countUp]="currentValue"></span>/{{maxValue}}</h3>
            <h6 class="card-text text-light">Used by {{calculatePercentage(currentValue,maxValue)}}%</h6>
        </div>
    </div>
    <div class="card shadow sales-1 overflow-hidden" *ngIf="cardType == type.sales">
        <div class="card-body">
            <span class="bg-{{color}}-transparent icon-service text-{{color}} float-end"><i class="fe fe-{{icon}}"></i> </span>
            <h6 class="mb-3 font-weight-500">{{title}}</h6>
            <h4 class="mb-1"><span class="number-font ">
                <span class="counter" [countUp]="currentValue">{{currentValue}}</span></span>
            </h4>
            <p class="mb-2"><span class="text-success fs-13 me-2">(+43%)</span> <span class="small text-muted">than last
                    week</span></p>
        </div>
        <div class="card-over-data ">
            <div class="chartjs-wrapper-demo ">
                <canvas width="100%" height="90" #myCanvas></canvas>
            </div>
        </div>
    </div>
</ng-container>
