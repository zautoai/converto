<div class="chat-bot" *ngIf="agentId && agent">

    <div class="chat-container">
        <app-chat-header [avatar]="agent" [fontSize]="getAvatarStyle()?.fontSize" [textColor]="getAvatarStyle()?.textColor" [background]="getAvatarStyle()?.primaryColor" [showCloseBtn]="showCloseBtn"></app-chat-header>
        <div class="welcome-containet" *ngIf="!isConvoStarted" [ngStyle]="{ 'background': getWelcomeGradient() }">
            <ng-container *ngIf="agent">
                <h3 [ngStyle]="{'color': getAvatarStyle()?.textColor}">{{agent.welcomeMsg}}</h3>
                <button class="btn-start-chat" (click)="startChat()"
                    [ngStyle]="{'background-color': getAvatarStyle()?.primaryColor,'color': getAvatarStyle()?.textColor}">
                    Start Chat <i class="zmdi zmdi-mail-send"></i>
                </button>
            </ng-container>
            <ng-container *ngIf="!agent">
                <ngx-skeleton-loader count="1" appearance="line"
                    [theme]="{'background-color':'#eff1f680',width:'100%'}"></ngx-skeleton-loader>
                <ngx-skeleton-loader count="1" appearance="line"
                    [theme]="{'background-color':'#eff1f680',width:'60%'}"></ngx-skeleton-loader>
                <ngx-skeleton-loader count="1" appearance="line"
                    [theme]="{'background-color':'#eff1f680',width:'10rem', height:'3rem'}"
                    class="btn-start-chat-loader"></ngx-skeleton-loader>
            </ng-container>
        </div>
        <div class="chat-body" #chatBody *ngIf="isConvoStarted">
            <ng-container *ngIf="isChatLoading">
                <div class="d-flex justify-content-start">
                    <ngx-skeleton-loader count="1" appearance="circle"></ngx-skeleton-loader>
                    <ngx-skeleton-loader count="1" [theme]="{ 'border-radius': '10px', height: '50px'}"
                        class="mt-5 w-75"></ngx-skeleton-loader>
                </div>
                <div class="d-flex justify-content-end">
                    <ngx-skeleton-loader count="1" [theme]="{ 'border-radius': '10px', height: '50px'}"
                        class="mt-5 w-75"></ngx-skeleton-loader>
                    <ngx-skeleton-loader count="1" appearance="circle"></ngx-skeleton-loader>
                </div>
                <div class="d-flex justify-content-start">
                    <ngx-skeleton-loader count="1" appearance="circle"></ngx-skeleton-loader>
                    <ngx-skeleton-loader count="1" [theme]="{ 'border-radius': '10px', height: '50px'}"
                        class="mt-5 w-75"></ngx-skeleton-loader>
                </div>
                <div class="d-flex justify-content-end">
                    <ngx-skeleton-loader count="1" [theme]="{ 'border-radius': '10px', height: '50px'}"
                        class="mt-5 w-75"></ngx-skeleton-loader>
                    <ngx-skeleton-loader count="1" appearance="circle"></ngx-skeleton-loader>
                </div>
            </ng-container>
            <!-- text msg -->
            <ng-container *ngIf="!isChatLoading ">
                <ng-container *ngFor="let chat of chatHistory.getMessages();">
                    <!-- messgae componet -->
                    <app-message 
                    [data]="chat"
                    [agent]="agent"
                    [background]="getAvatarStyle()?.primaryColor"
                    [fontSize]="getAvatarStyle()?.fontSize"
                    [textColor]="getAvatarStyle()?.textColor"
                    [animationSpeed]="(lastMessage ? 10 : 0)"
                    ></app-message>

                    <!-- lead form -->
                    <app-lead-form
                    [leadData]="leadData"
                    [convId]="convId"
                    [avatar]="agent"
                    [data]="chat"
                    [background]="getAvatarStyle()?.primaryColor"
                    [fontSize]="getAvatarStyle()?.fontSize"
                    [textColor]="getAvatarStyle()?.textColor"
                    (onLeadSubmitEvent)="onLeadSubmit($event)"
                    ></app-lead-form>

                </ng-container>

                <!-- Typing indicator -->
                <app-typing-indicator 
                [avatar]="agent"
                [fontSize]="getAvatarStyle()?.fontSize" 
                *ngIf="isTyping"
                ></app-typing-indicator>
            </ng-container>
        </div>

        <app-chat-footer 
        [show]="isConvoStarted" 
        [convData]="convData"
        (onSendMessage)="onSendMsg($event)"
        (onSendHandoverRequest)="sendHandoverRequest($event)"
        [disable]="isTyping || isChatLoading"
        [fontSize]="getAvatarStyle()?.fontSize"
        [textColor]="getAvatarStyle()?.textColor"
        [background]="getAvatarStyle()?.primaryColor"
        ></app-chat-footer>

        <div class="powered_by">
            powered by <a href="https://zautoai.com" target="_blank"><img
                    src="https://zautoai.com/images/zautoai-white-theme.webp" alt="zautoai"></a>
        </div>
    </div>

    <audio #audioPlayer>
        <source src="assets/audio/mgs_sound.mp3">
    </audio>
</div>
