<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="text-center"><img width="24" height="24" [src]="data.iconUrl" [alt]="data.name"/> {{data.name}}</h5>
        <p class="text-center">{{data.description}}</p>
        @if (!data.isConnected) {
            <button class="btn btn-primary btn-block" [disabled]="data.authUrl == null || isLoading" (click)="connect()">
                @if (isLoading) {
                    <div class="spinner-border spinner-border-sm" role="status">
                        <span class="visually-hidden">Loading...</span>
                      </div>
                }
                @else {
                    <i class="fa-solid fa-plug"></i> Connect
                }
            </button>
        }
        @else {
            <div class="p-3 border border-primary rounded-3 mb-2 d-flex justify-content-between">
                <span>{{data.profile?.email}}</span> <a role="button" (click)="revoke()"><i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        }
        <button class="btn btn-outline-primary btn-block" [disabled]="!data.isConnected" (click)="openMapping()"><i class="fa-solid fa-sitemap"></i> Mappings</button>
    </div>
</div>
