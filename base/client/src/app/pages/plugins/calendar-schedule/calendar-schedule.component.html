<div class="form-group mb-3" >
    <label for="connected_to">Select your calendar</label>
    <select name="connectedTo" id="connected_to" class="form-select" [(ngModel)]="selectedCalendar" [disabled]="isLoading">
      <option [value]="null" [disabled]="true">
        --- Select your calendar ---
      </option>
      <option [value]="calendar?.id" *ngFor="let calendar of calendars">{{calendar?.summary}}</option>
    </select>
  </div>

<div class="form-group mb-3">
    <label for="connected_to">Event duration</label>
    <select name="connectedTo" id="connected_to" class="form-select" [(ngModel)]="selectedEventDuration" [disabled]="isLoading">
        <ng-container *ngFor="let duration of eventDuration">
            <option [value]="duration.value">{{duration.lable}}</option>
        </ng-container>
    </select>
</div>
<div class="p-3">
    <h5>Available days</h5>
    <ul>
        <li *ngFor="let day of daysOfWeek;index as i;">
            <label class="custom-control custom-checkbox mb-2">
                <input type="checkbox" name="{{ day }}" class="custom-control-input" (click)="selectAvailableDays(i)"
                    [checked]="checkDateSelected(day)" [disabled]="isLoading" />
                <span class="custom-control-label">{{ day }}</span>
            </label>
        </li>
    </ul>
    <div class="border-bottom w-100 my-5"></div>
    <h5>Available hours</h5>
    <ng-container *ngFor="let hours of selectedAvailableHours; let i = index">
        <div class="d-flex justify-content-start mb-2">
            <select class="form-select form-select-sm me-2" [(ngModel)]="selectedAvailableHours[i].start"
            [disabled]="isLoading">
                <ng-container>
                    <option [value]="hour" *ngFor="let hour of availableHours"
                        [disabled]="hour >= selectedAvailableHours[i].end">
                        {{ hour }}
                    </option>
                </ng-container>
            </select>
            <select class="form-select form-select-sm me-2" [(ngModel)]="selectedAvailableHours[i].end"
            [disabled]="isLoading">
                <ng-container>
                    <option [value]="hour" *ngFor="let hour of availableHours"
                        [disabled]="hour <= selectedAvailableHours[i].start">
                        {{ hour }}
                    </option>
                </ng-container>
            </select>
            <button class="btn btn-outline-primary btn-sm" (click)="removeAvailableHour(i)" [disabled]="isLoading">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </ng-container>
    <button class="btn btn-sm btn-primary" (click)="addAvailableHour()" [disabled]="isLoading">
        Add available hours
    </button>
</div>

<div class="p-2 row">
    <div class="col-6">
        <button class="btn btn-outline-primary w-100"  [disabled]="isLoading">Cancel</button>
    </div>
    <div class="col-6">
        <button class="btn btn-primary w-100" (click)="onSaveSubmit()" [disabled]="isLoading">Save</button>
    </div>
</div>
