<div class="row mt-3">
    <div class="col-12">
        <div class="card shadow">
            <div class="card-header">
                <h4 class="card-title">External CRMs</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    @for (item of crms; track $index) {
                        <div class="col-2">
                            <app-plugin-card [data]="item" (mappingOpen)="openCrmMappingOffcanvas($event)"></app-plugin-card>
                        </div>
                    }
                    @empty {
    
                    }
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #crmMappingOffcanvas let-offcanvas>
    <div class="offcanvas-header">
        <h4 class="offcanvas-title">CRM Mapping</h4>
        <button type="button" class="btn-close" aria-label="Close" (click)="offcanvas.dismiss()"></button>
    </div>
    <hr class="m-0">
    <div class="offcanvas-body">

    </div>
</ng-template>
