<table class="table">
    <thead>
        <tr>
            <th class="w-50">Fields</th>
            <th class="w-50">External field</th>
        </tr>
    </thead>
    <tbody>
        @for (item of contactFields; track $index) {
            <tr>
                <td><input type="text" class="form-control form-control-sm" disabled [value]="item"></td>
                <td>
                    <select class="form-control form-control-sm">
                        @for (opt of externalCrmFields; track $index) {
                            <option [value]="opt.name">{{opt?.label}}</option>
                        }
                    </select>
                </td>
            </tr>
        }
    </tbody>
</table>
