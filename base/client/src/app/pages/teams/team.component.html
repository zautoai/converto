<div class="col-lg-12 mt-3">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title"> <i class="fa fa-users"></i> Team</h3>
      <div class="card-options">
        <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addUser"
          (click)="openCreateUser();">
          <i class="fa fa-plus"></i>
          Add new
        </button>
      </div>
    </div>

    <div class="card-body">
      <div class="table-responsive mb-3">
        <table class="table border card-table table-vcenter text-nowrap align-items-center">
          <thead class="bg-primary text-white">
            <th class="text-white">Name</th>
            <th class="text-white">Email</th>
            <th class="text-white">Role</th>
            <th class="text-white">Created At</th>
            <th class="text-white">Updated At</th>
            <th class="text-white">Action</th>
          </thead>
          <tbody>
            <ng-container *ngFor="let user of usersData?.data">
              <tr *ngIf="user?.role.name == 'user'">
                <td>{{ user?.name }}</td>
                <td>{{ user?.email }}</td>
                <td>{{user?.role.name}}</td>
                <td>{{user?.createdAt | date}}</td>
                <td>{{user?.modifiedAt | date}}</td>

                <td class="icon w-1">
                  <button (click)="openUpdateUser(user)">
                    <i class="fa fa-edit text-secondary update"></i>
                  </button>
                  <button (click)="openDeleteForm(user)">
                    <i class="fa fa-trash-o text-danger delete"></i>
                  </button>
                </td>
              </tr>
            </ng-container>
            <tr *ngIf="usersData?.data?.length <= 0">
              <td class="text-center" colspan="6">User not found.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-pagination [totalPages]="totalPages" [limit]="limit"
      (pageChanged)="onPageChanged($event)"></app-pagination>
    </div>
  </div>
</div>

<app-advance-offcanvas heading="{{ isEdit ? 'Edit' : 'Create'}} user">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group mb-3">
      <advanced-input [label]="'Username'" [type]="'text'" [placeholder]="'username'" [size]="'md'" [control]="name"
        [isDisabled]="isLoading" [errorMessages]="errorMessages.name"></advanced-input>
    </div>
    <div class="form-group mb-3">
      <advanced-input [label]="'Email'" [type]="'email'" [placeholder]="'email'" [size]="'md'" [control]="email"
        [isDisabled]="isLoading" [errorMessages]="errorMessages.email"></advanced-input>
    </div>
    @if(!isEdit){
      <div class="form-group mb-3">
        <advanced-input [label]="'Password'" [type]="'password'" [placeholder]="'password'" [size]="'md'" [control]="password"
          [isDisabled]="isLoading" [errorMessages]="errorMessages.password"></advanced-input>
      </div>
    }
    <div class="d-flex gap-3 justify-content-end">
      <advanced-button label="{{ isEdit ? 'Update' : 'Create'}}" [size]="'md'" [classes]="'w-100'" [type]="'submit'"
        [isLoading]="isLoading"></advanced-button>
      <advanced-button label="Cancel" [size]="'md'" [classes]="'w-100'" [type]="'button'" [color]="'outline-primary'"
        [isLoading]="isLoading" (onClick)="closeComposeCanvas()"></advanced-button>
    </div>
  </form>
</app-advance-offcanvas>

<app-advanced-modals [modalTitle]="'Delete Item'" [modalType]="'confirm'"
  [modalMessage]="'Are you sure you want to delete this item? This action cannot be undone.'"
  [modalConformMessage]="'Delete'" [modalCancelMessage]="'Cancel'"
  (confirm)="onDeleteSubmit($event)"></app-advanced-modals>
