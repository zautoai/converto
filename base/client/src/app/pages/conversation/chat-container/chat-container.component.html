<div class="d-flex flex-column h-100" *ngIf="convoData">
  <div class="chat-container position-relative h-100" #chatBody>
    <ng-container *ngIf="isconvoDataLoading">
      <div class="d-flex justify-content-start">
        <ngx-skeleton-loader count="1" appearance="circle"></ngx-skeleton-loader>
        <ngx-skeleton-loader count="1" [theme]="{ 'border-radius': '10px', height: '50px'}"
          class="mt-5 w-50"></ngx-skeleton-loader>
      </div>
      <div class="d-flex justify-content-end">
        <ngx-skeleton-loader count="1" [theme]="{ 'border-radius': '10px', height: '50px'}"
          class="mt-5 w-50"></ngx-skeleton-loader>
        <ngx-skeleton-loader count="1" appearance="circle"></ngx-skeleton-loader>
      </div>
      <div class="d-flex justify-content-start">
        <ngx-skeleton-loader count="1" appearance="circle"></ngx-skeleton-loader>
        <ngx-skeleton-loader count="1" [theme]="{ 'border-radius': '10px', height: '50px'}"
          class="mt-5 w-50"></ngx-skeleton-loader>
      </div>
      <div class="d-flex justify-content-end">
        <ngx-skeleton-loader count="1" [theme]="{ 'border-radius': '10px', height: '50px'}"
          class="mt-5 w-50"></ngx-skeleton-loader>
        <ngx-skeleton-loader count="1" appearance="circle"></ngx-skeleton-loader>
      </div>
    </ng-container>
    <ng-container *ngIf="!isconvoDataLoading">
      <ng-container *ngFor="let chat of sortHistory(chatHistroy.getMessages() || [])">
        <div class="d-flex justify-content-start" *ngIf="chat?.role === 'user' && chat?.type == 'TEXT'">
          <div class="main-img-user avatar-sm">
            <img alt="avatar" class="rounded-circle" src="{{GLOBAL_IMAGES.default_user}}">
          </div>
          <div class="msg_cotainer mt-5 left">
            <markdown [data]="chat?.content"></markdown>
            <div class="d-flex justify-content-between">
              <span>{{chat.createdAt | moment}}</span>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-end" *ngIf="chat?.role === 'assistant' && chat?.type == 'TEXT'">
          <div class="msg_cotainer mt-5 right"
            [ngClass]="{'upvote':chat.vote == vote.UPVOTE,'downvote':chat.vote == vote.DOWNVOTE}">
            <div class="p-2">
              <markdown [data]="chat?.content"></markdown>
              <div class="d-flex justify-content-end">
                <span>{{chat.createdAt | moment}}</span>
              </div>
            </div>
            <div class="vote" [ngClass]="{'upvote':chat.vote == vote.UPVOTE,'downvote':chat.vote == vote.DOWNVOTE}">
              <span class="upvote" *ngIf="chat.vote == vote.UPVOTE">
                Liked <i class="fa fa-thumbs-up"></i></span>
              <span class="downvote" *ngIf="chat.vote == vote.DOWNVOTE">
                Disliked <i class="fa fa-thumbs-down"></i></span>
            </div>
          </div>
          <div class="main-img-user avatar-sm">
            <img alt="avatar" class="rounded-circle"
              [src]="convoData?.agent?.logoUrl || GLOBAL_IMAGES.default_avatar_image">
          </div>
        </div>
        <div class="d-flex justify-content-center" *ngIf="chat?.role === 'assistant' && (chat?.type == 'ACTIVITY' || chat?.type == 'NAVIGATION')">
          <div class="msg_cotainer mt-5 action text-center">
            <span>{{chat.createdAt | moment}}</span>
            <markdown [data]="chat?.content"></markdown>
          </div>
        </div>
        <div class="d-flex justify-content-center" *ngIf="chat?.role === 'user' && chat?.type == 'PAGE_ACTIVITY'">
          <div class="msg_cotainer mt-5 action text-center">
            <span>{{chat.createdAt | moment}}</span>
            <div>Clicked <a href="{{chat?.activityJson?.link}}" target="_blank">{{chat?.activityJson?.text}}</a></div>
          </div>
        </div>
      </ng-container>
    </ng-container>
  </div>

  <div class="chat-footer">
    <ng-container *ngIf="isconvoDataLoading">
      <ngx-skeleton-loader count="1" [theme]="{ 'border-radius': '10px', height: '50px'}" style="width: 80%;margin-top: 15px; margin-left: 10px;"></ngx-skeleton-loader>
      <ngx-skeleton-loader count="2" [appearance]="'circle'"></ngx-skeleton-loader>
    </ng-container>
    <ng-container *ngIf="!isconvoDataLoading">
      <textarea name="chat" id="chat" placeholder="Write a message..." rows="2" [(ngModel)]="messageInput"
        (keydown.enter)="onEnter($event)" [disabled]="!convoData?.aiSuspended"></textarea>
        <button type="submit" class="btn btn-primary btn-pill me-3 px-1" [disabled]="!convoData?.aiSuspended" (click)="sendMsg()">
          <i class="fa fa-send"></i>
        </button>
  
        <!-- human handover -->
      <button class="btn btn-primary btn-pill me-3 px-1" *ngIf="!convoData.aiSuspended && !connectionInprogress"
        (click)="startChat()" [ngbPopover]="'Suspend AI and enable human support.'" triggers="mouseenter:mouseleave"><i
          class="fa-solid fa-message"></i></button>
  
      <button class="btn btn-primary btn-pill me-3 px-1" *ngIf="convoData.aiSuspended && !connectionInprogress"
        (click)="endChat()" [ngbPopover]="'Connect to AI and deactivate human support.'"
        triggers="mouseenter:mouseleave"><i class="fa-solid fa-robot"></i></button>
    </ng-container>
  </div>
  <!-- <div class="chat-footer" *ngIf="convoData?.aiSuspended && checkAssignee(convoData?.assigneeId) && !isconvoDataLoading">
      <textarea name="chat" id="chat" placeholder="Write a message..." rows="2" [(ngModel)]="messageInput"
        (keydown.enter)="onEnter($event)" [disabled]="!convoData?.aiSuspended"></textarea>
      <button type="submit" [disabled]="!convoData?.aiSuspended" (click)="sendMsg()">
        <i class="zmdi zmdi-mail-send"></i>
      </button>
    </div> -->
</div>
<div *ngIf="!convoData" class="h-100 w-100 d-flex justify-content-center align-items-center">
  <span class="text-muted">Select conversation for more details</span>
</div>
