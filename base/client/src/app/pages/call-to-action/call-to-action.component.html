<div class="card shadow mt-3">
  <div class="card-header d-flex justify-content-between">
    <h4 class="card-title">
      <span class="fe fe-check-circle"></span> Call to Action
    </h4>
    <div>
      <div ngbDropdown class="d-inline-block">
        <a
          href="javascript:void(0)"
          class="text-muted"
          id="dropdownBasic1"
          ngbDropdownToggle
        >
          <button class="btn btn-outline-primary btn-sm">New CTA</button>
        </a>
        <div ngbDropdownMenu aria-labelledby="dropdownBasic1">
          <button ngbDropdownItem (click)="openCreateCta()">Create</button>
          <div class="dropdown-divider"></div>
          <button ngbDropdownItem (click)="openGenerateCta()">Generate</button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body p-0">
    <div class="row">
      <div class="col-3 border-end pe-0">
        <ul class="scroll-container-v vh-100" #scrollContainer>
          <ng-container *ngIf="!ctaList.data">
            <li>
              <ngx-skeleton-loader
                count="5"
                [theme]="{ 'border-radius': '0', height: '50px' }"
              ></ngx-skeleton-loader>
            </li>
          </ng-container>
          <ng-container *ngIf="ctaList.data">
            <li
              *ngFor="let item of ctaList.data"
              class="zauto-card"
              (click)="selectCta(item)"
              [ngClass]="{ active: selectedCta && selectedCta?.id == item?.id }"
            >
              <div>
                {{ item?.name }}
              </div>
            </li>
          </ng-container>
        </ul>
      </div>
      <div class="col-9 m-0">
        <ng-container *ngIf="selectedCta">
          <div class="p-2">
            <div class="d-flex justify-content-end">
              <div ngbDropdown class="d-inline-block">
                <a
                  href="javascript:void(0)"
                  class="text-muted"
                  id="dropdownBasic1"
                  ngbDropdownToggle
                >
                  <i class="fe fe-more-horizontal"></i>
                </a>
                <div ngbDropdownMenu aria-labelledby="dropdownBasic1">
                  <button ngbDropdownItem (click)="openUpdateCta()">
                    <i class="fa fa-edit"></i> Edit
                  </button>
                  <div class="dropdown-divider"></div>
                  <button
                    ngbDropdownItem
                    class="text-danger"
                    (click)="openDeleteCta()"
                  >
                    <i class="fa fa-trash"></i>
                    Delete
                  </button>
                </div>
              </div>
            </div>
            <table class="table table-borderless">
              <tbody>
                <tr>
                  <td><b>Name :</b></td>
                  <td>{{ selectedCta?.name }}</td>
                </tr>
                <tr>
                  <td><b>Description :</b></td>
                  <td>{{ selectedCta?.description }}</td>
                </tr>
                <tr>
                  <td><b>Type :</b></td>
                  <td>{{ selectedCta?.type }}</td>
                </tr>
                <tr>
                  <td><b>Link :</b></td>
                  <td>
                    <a href="{{ selectedCta?.link }}" target="_blank">{{
                      selectedCta?.link
                    }}</a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </ng-container>
        <ng-container *ngIf="!selectedCta">
          <div class="h-100 d-flex justify-content-center align-items-center">
            <span class="text-muted">Select CTA for more details</span>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>

<ng-template #generateCTAOffcanvas let-offcanvas>
  <div class="offcanvas-header">
    <h4 class="offcanvas-title">
      <i class="fe fe-check-circle"></i> Generate CTA
    </h4>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="offcanvas.dismiss()"
    ></button>
  </div>
  <hr class="m-0" />
  <div class="offcanvas-body">
    <ng-scrollbar>
      <ng-container *ngIf="isGeneratingCTA">
        <ngx-skeleton-loader
          count="3"
          [theme]="{ 'border-radius': '0', height: '100px' }"
        ></ngx-skeleton-loader>
      </ng-container>
      <ng-container *ngIf="!isGeneratingCTA && generatedCTAS.length > 0">
        <ul>
          <li *ngFor="let cta of generatedCTAS">
            <div class="card shadow-sm">
              <div class="card-body">
                <div class="row">
                  <div class="col-2 py-auto">
                    <label
                      class="custom-control custom-checkbox mb-0 align-middle"
                    >
                      <input
                        type="checkbox"
                        name="lead-only"
                        class="custom-control-input"
                        (click)="selectFromGenerated(cta)"
                      />
                      <span class="custom-control-label"></span>
                    </label>
                  </div>
                  <div class="col-10">
                    <div>
                      <strong>{{ cta?.label }}</strong>
                    </div>
                    <div class="text-muted">{{ cta?.text }}</div>
                    <div>
                      <i class="fe fe-link"></i>
                      <a href="{{ cta?.link }}">{{ cta?.link }}</a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </li>
        </ul>
        <div class="">
          <div class="d-flex justify-content-end">
            <button
              class="btn btn-outline-primary w-100 me-2"
              (click)="offcanvas.dismiss()"
            >
              <i class="fa fa-times"></i> Close
            </button>
            <button class="btn btn-primary w-100" (click)="submitSelectCTAS()">
              <i class="fa fa-plus"></i> Add
            </button>
          </div>
        </div>
      </ng-container>
    </ng-scrollbar>
  </div>
</ng-template>
<app-advance-offcanvas heading="{{ isEdit ? 'Edit' : 'Create' }} CTA">
  <form [formGroup]="ctaForm" (ngSubmit)="onCreateSubmit()">
    <div class="row">
      <div class="form-group mb-3">
        <advanced-input
          [label]="'Name'"
          [type]="'text'"
          [placeholder]="'Stage'"
          [control]="name"
          [size]="'md'"
          [isDisabled]="isLoading"
        ></advanced-input>
      </div>
      <div class="form-group mb-3">
        <advanced-input
          [label]="'Description'"
          [type]="'text'"
          [control]="description"
          [placeholder]="'Description'"
          [size]="'md'"
          [isDisabled]="isLoading"
        ></advanced-input>
      </div>
      <div class="form-group mb-3">
        <advanced-input
          [label]="'Link'"
          [type]="'text'"
          [control]="link"
          [placeholder]="'Link'"
          [size]="'md'"
          [isDisabled]="isLoading"
        ></advanced-input>
      </div>
      <div class="form-group mb-3">
        <advanced-input
          [label]="'Type'"
          [type]="'select'"
          [control]="type"
          [placeholder]="'Select type'"
          [size]="'md'"
          [isDisabled]="isLoading"
        >
          <option *ngFor="let ctaType of ctaTypes" [value]="ctaType.value">
            {{ ctaType.name }}
          </option>
          ></advanced-input
        >
      </div>
    </div>
    <div class="d-flex gap-3 justify-content-end">
      <advanced-button
        label="{{ isEdit ? 'Update' : 'Create' }}"
        [size]="'md'"
        [classes]="'w-100'"
        [type]="'submit'"
        [isLoading]="isLoading"
      ></advanced-button>

      <advanced-button
        label="Cancel"
        [size]="'md'"
        [classes]="'w-100'"
        [type]="'button'"
        [color]="'outline-primary'"
        [isLoading]="isLoading"
        (onClick)="onCancel()"
      ></advanced-button>
    </div>
  </form>
</app-advance-offcanvas>
