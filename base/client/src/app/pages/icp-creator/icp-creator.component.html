<div class="col-lg-12 mt-3">
    <div class="card">
        <div class="card-header">
            <i class="fa fa-plus me-2"></i>
            <h3 class="card-title">
                Create ICP
            </h3>
            <div class="card-options">
                <button type="button" class="btn btn-outline-primary" [disabled]="icpForm.invalid" (click)="onSubmit()">
                    <i class="fa fa-save"></i> Create
                </button>
            </div>
        </div>
        <div class="card-body p-2">
            <div class="row">
                <div class="col-4 p-2 border-end">
                    <h4>
                        Segments
                    </h4>
                    <div ngbAccordion [closeOthers]="true">
                        <div *ngFor="let data of segmentCategoryData; let i = index" ngbAccordionItem
                            [collapsed]="i !== 0">
                            <h2 ngbAccordionHeader>
                                <button ngbAccordionButton>{{data.name}}</button>
                            </h2>
                            <div ngbAccordionCollapse>
                                <div ngbAccordionBody>
                                    <ng-template>
                                        <ul>
                                            <ng-container *ngFor="let segment of segmentData">
                                                <li *ngIf="segment.segmentCategoryId === data.id">
                                                    <label class="custom-control custom-checkbox mb-2">
                                                        <input type="checkbox" class="custom-control-input"
                                                            [value]="segment.id" [checked]="isSelected(segment.id)"
                                                            (change)="onSegmentChange($event,data, segment)">
                                                        <span class="custom-control-label">{{ segment.name }}</span>
                                                    </label>
                                                </li>
                                            </ng-container>
                                        </ul>
                                    </ng-template>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-7 p-2">
                    <form [formGroup]="icpForm" (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" id="name" formControlName="name" class="form-control">
                            <div *ngIf="icpForm.get('name')?.invalid && icpForm.get('name')?.touched"
                                class="text-danger">
                                Name is required.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea id="description" formControlName="description" class="form-control"
                                style="height: 100px;"></textarea>
                            <div *ngIf=" icpForm.get('description')?.invalid && icpForm.get('description')?.touched"
                                class="text-danger">
                                Description is required.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="startValue" class="form-label">Start Value</label>
                            <input type="number" id="startValue" formControlName="startValue" class="form-control">
                            <div *ngIf="icpForm.get('startValue')?.invalid && icpForm.get('startValue')?.touched"
                                class="text-danger">
                                Start Value is required.
                            </div>
                        </div>
                    </form>
                    <div class="mt-4">
                        <ng-container *ngIf="displaySegments.length > 0; else noSegmentsSelected">
                            <div *ngFor="let category of displaySegments">
                                <h5>{{ category.name }}</h5>
                                <ol>
                                    <li *ngFor="let segment of category.segments">
                                        <span>{{ segment }}</span>
                                    </li>
                                </ol>
                            </div>
                        </ng-container>
                        <ng-template #noSegmentsSelected>
                            <p class="text-danger">Please Select a Segment</p>
                        </ng-template>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
