<ul class="row">
    <li class="col-4" *ngFor="let keyValuePair of countsData | keyvalue">
        <div class="card">
            <div class="card-body p-2 text-center">
                <i class="fe fe-{{getIcons(keyValuePair.key)}} fs-2 mb-3"></i>
                <h6 class="mb-0">Total {{keyValuePair.key}}</h6>
                <h2 class="mb-1 mt-2 number-font counter">{{keyValuePair.value}}</h2>
                <div class="d-flex justify-content-between">
                    <!-- <h4 class="my-auto mx-3"><i class="fe fe-{{getIcons(keyValuePair.key)}}"></i> {{keyValuePair.key}} : </h4> 
                    <h4 class="my-auto mx-3">{{keyValuePair.value}}</h4> -->
                </div>
            </div>
        </div>
    </li>
</ul>
