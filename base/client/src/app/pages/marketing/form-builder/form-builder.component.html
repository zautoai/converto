<div class="col-lg-12 mt-3">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title"><i class="fa fa-cube"></i> Form Builder</h3>
      <div class="card-options">
        <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addForm"
          (click)="openCreateForm()">
          <i class="fa fa-plus"></i>
          Create Form Builder
        </button>
      </div>
    </div>

    <div class="card-body">
      <div class="table-responsive mb-3">
        <table class="table border card-table table-vcenter text-nowrap align-items-center">
          <thead class="bg-primary text-white">
            <th class="text-white">Title</th>
            <th class="text-white">Description</th>
            <th class="text-white">Action</th>
          </thead>
          <tbody>
            <ng-container>
              <tr *ngFor="let data of submittedData">
                <td>
                  {{ data.title }}
                </td>
                <td>
                  {{ data.description }}
                </td>
                <td class="icon w-1">
                  <button >
                    <i class="fa fa-eye text-secondary view"></i>
                  </button>

                  <button (click)="openUpdateForm(data)">
                    <i class="fa fa-edit text-success update"></i>
                  </button>

                  <button (click)="openDeleteForm(data)">
                    <i class="fa fa-trash-o text-danger delete"></i>
                  </button>
                </td>
              </tr>
            </ng-container>
            
          </tbody>
        </table>
      </div>

      

      <app-pagination [totalPages]="totalItems" [limit]="limit" (pageChanged)="onPageChange($event)" />
    </div>
  </div>
</div>

<app-advance-offcanvas heading="{{ isEdit ? 'Edit' : 'Create'}} form">
  <form [formGroup]="form" (ngSubmit)="onSubmitForm()">
    <div class="form-group mb-3">
      <advanced-input [label]="'Title'" [type]="'text'" [placeholder]="'Form title'" [size]="'md'" [control]="title"
        [isDisabled]="isLoading" [errorMessages]="errorMessages.title"></advanced-input>
    </div>
    <div class="form-group mb-3">
      <advanced-input [label]="'Description'" [type]="'textarea'" [placeholder]="'Form description'" [size]="'md'"
        [control]="description" [rows]="3" [isDisabled]="isLoading"></advanced-input>
    </div>
    <div class="card">
      <div class="card-header">
        <h4 class="m-0">Select form fields</h4>
      </div>
      <div class="card-body">
        <div class="form-group mb-3">
          <advanced-input [label]="'Name Field'" [type]="'checkbox'" [size]="'md'" [control]="name"
            [isDisabled]="isLoading"></advanced-input>
        </div>
        <div class="form-group mb-3">
          <advanced-input [label]="'Email Field'" [type]="'checkbox'" [size]="'md'" [control]="email"
            [isDisabled]="isLoading"></advanced-input>
        </div>
        <div class="form-group mb-3">
          <advanced-input [label]="'Phone Field'" [type]="'checkbox'" [size]="'md'" [control]="phoneNumber"
            [isDisabled]="isLoading"></advanced-input>
        </div>
      </div>
    </div>
    <div class="d-flex gap-3 justify-content-end">
      <advanced-button label="{{ isEdit ? 'Update' : 'Create'}}" [size]="'md'" [classes]="'w-100'" [type]="'submit'"
        [isLoading]="isLoading"></advanced-button>
      <advanced-button label="Cancel" [size]="'md'" [classes]="'w-100'" [type]="'button'" [color]="'outline-primary'"
        [isLoading]="isLoading"></advanced-button>
    </div>
  </form>
</app-advance-offcanvas>

<app-advanced-modals
  [modalTitle]="'Delete Item'"
  [modalMessage]="'Are you sure you want to delete this item? This action cannot be undone.'"
  [modalConformMessage]="'Delete'"
  [modalCancelMessage]="'Cancel'"
  (confirm)="onDeleteSubmit($event)"
></app-advanced-modals>
