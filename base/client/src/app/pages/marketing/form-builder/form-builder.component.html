<div class="d-flex justify-content-between my-3">
  <h3>Form builder</h3>
  <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addForm"
    (click)="openCreateForm()">
    <i class="fa fa-plus"></i>
    Create Form Builder
  </button>
</div>
<div class="row">
  <div class="col-8">
    @if(formData.data){
      @for (entity of formData.data; track $index) {
        <app-form-card [data]="entity" [isActive]="entity?.id === selectedForm?.id" (onClick)="selectForm(entity)">
          <button class="dropdown-item" >
            <i class="fa fa-eye text-secondary"></i> View
          </button>
          <button class="dropdown-item" (click)="openUpdateForm(entity)">
            <i class="fa fa-edit text-success"></i> Update
          </button>
          <button class="dropdown-item" (click)="openDeleteForm(entity)">
            <i class="fa fa-trash-o text-danger"></i> Delete
          </button>
        </app-form-card>
      }
      @empty {
        <div class="card">
          <div class="card-body text-center">
            <h4 class="text-muted">No forms found</h4>
          </div>
        </div>
      }
    }
    <div class="my-auto">
      <app-pagination [totalPages]="totalItems" [limit]="limit" (pageChanged)="onPageChange($event)" />
    </div>
  </div>
  <div class="col-4">
    <app-form-preview-card [htmlContent]="htmlContent" [scriptContent]="scriptContent"></app-form-preview-card>
  </div>
</div>

<app-advance-offcanvas heading="{{ isEdit ? 'Edit' : 'Create'}} form">
  <form [formGroup]="form" (ngSubmit)="onSubmitForm()">
    <div class="form-group mb-3">
      <advanced-input [label]="'Title'" [type]="'text'" [placeholder]="'Form title'" [size]="'md'" [control]="title"
        [isDisabled]="isLoading" [errorMessages]="errorMessages.title"></advanced-input>
    </div>
    <div class="form-group mb-3">
      <advanced-input [label]="'Description'" [type]="'textarea'" [placeholder]="'Form description'" [size]="'md'"
        [control]="description" [rows]="3" [isDisabled]="isLoading"></advanced-input>
    </div>
    <div class="card">
      <div class="card-header">
        <h4 class="m-0">Select form fields</h4>
      </div>
      <div class="card-body">
        <div class="form-group mb-3">
          <advanced-input [label]="'Name Field'" [type]="'checkbox'" [size]="'md'" [control]="name"
            [isDisabled]="isLoading"></advanced-input>
        </div>
        <div class="form-group mb-3">
          <advanced-input [label]="'Email Field'" [type]="'checkbox'" [size]="'md'" [control]="email"
            [isDisabled]="isLoading"></advanced-input>
        </div>
        <div class="form-group mb-3">
          <advanced-input [label]="'Phone Field'" [type]="'checkbox'" [size]="'md'" [control]="phoneNumber"
            [isDisabled]="isLoading"></advanced-input>
        </div>
      </div>
    </div>
    <div class="d-flex gap-3 justify-content-end">
      <advanced-button label="{{ isEdit ? 'Update' : 'Create'}}" [size]="'md'" [classes]="'w-100'" [type]="'submit'"
        [isLoading]="isLoading"></advanced-button>
      <advanced-button label="Cancel" [size]="'md'" [classes]="'w-100'" [type]="'button'" [color]="'outline-primary'"
        [isLoading]="isLoading" (onClick)="closeComposeCanvas()"></advanced-button>
    </div>
  </form>
</app-advance-offcanvas>

<app-advanced-modals [modalTitle]="'Delete Item'"
  [modalMessage]="'Are you sure you want to delete this item? This action cannot be undone.'"
  [modalConformMessage]="'Delete'" [modalCancelMessage]="'Cancel'"
  (confirm)="onDeleteSubmit($event)"></app-advanced-modals>
