<div class="m-3">
  <app-wlcome-card [name]="authService.getUser().name">
    <div class="d-none d-lg-block">
      <div class="d-flex gap-2">
        <select name="" id="" class="form-select form-select-sm " (change)="getDashboardData()"
          [(ngModel)]="selectedDateFilter">
          <option [value]="filter" *ngFor="let filter of dateFilter">{{removeUnderscore(filter) | titlecase}}</option>
        </select>
        <ng-container *ngIf="selectedDateFilter == DateFilter.BETWEEN">
          <input type="date" class="form-control form-control-sm" [(ngModel)]="startDate" [max]="endDate"
            (change)="getDashboardData()">
          <input type="date" class="form-control form-control-sm" [(ngModel)]="endDate" [min]="startDate"
            (change)="getDashboardData()">
        </ng-container>
      </div>
    </div>
  </app-wlcome-card>
  <app-channelengagement></app-channelengagement>


</div>
