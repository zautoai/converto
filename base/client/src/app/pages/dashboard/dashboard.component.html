<div class="m-3">
  <app-wlcome-card [name]="authService.getUser().name">
    <div class="d-none d-lg-block">
      <div class="d-flex gap-2">
        <select
          name=""
          id=""
          class="form-select form-select-sm"
          (change)="getDashboardData()"
          [(ngModel)]="selectedDateFilter"
        >
          <option [value]="filter" *ngFor="let filter of dateFilter">
            {{ removeUnderscore(filter) | titlecase }}
          </option>
        </select>
        <ng-container *ngIf="selectedDateFilter == DateFilter.BETWEEN">
          <input
            type="date"
            class="form-control form-control-sm"
            [(ngModel)]="startDate"
            [max]="endDate"
            (change)="getDashboardData()"
          />
          <input
            type="date"
            class="form-control form-control-sm"
            (ngModel)]="endDate"
            [min]="startDate"
            (change)="getDashboardData()"
          />
        </ng-container>
      </div>
    </div>
  </app-wlcome-card>
  <app-dash-card></app-dash-card>
  <app-channel-impression></app-channel-impression>
  <app-page-replacement></app-page-replacement>
  <app-channel-metrics></app-channel-metrics>
  <div class="row">
    <div class="col-6">
      <app-predictive-lead></app-predictive-lead>
    </div>
    <div class="col-6">
      <app-scoring-intent></app-scoring-intent>
    </div>
  </div>
</div>
