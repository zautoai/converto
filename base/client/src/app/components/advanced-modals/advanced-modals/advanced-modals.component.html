<ng-template #contentModal let-modal>
  @switch (modalType) {
  @case ('delete') {
    <div class="modal-header border-bottom-1" style="background-color: #F5F5F5;">
      <span class=" text-center w-100">
        <h1 class="modal-title fs-5 ">{{ modalTitle }}</h1>
      </span>
    </div>
  <div class="modal-body p-4 text-center" style="background-color: #F5F5F5;">
    <h5 class="mb-0">{{modalMessage}}</h5>
  </div>
  <div class="modal-footer flex-nowrap p-0 ">
    <button type="button" class="btn btn-lg btn-link fs-6 text-decoration-none col-6 py-3 m-0 rounded-0 border-end" (click)="onConfirm()" [disabled]="isLoading"
      style="background-color: #F5F5F5;"><strong class="text-danger">Yes
        delete</strong></button>
    <button type="button" class="btn btn-lg btn-link fs-6 text-decoration-none col-6 py-3 m-0 rounded-0" (click)="onCancel()" [disabled]="isLoading"
      data-bs-dismiss="modal" style="background-color: #F5F5F5;">No thanks</button>
  </div>

  }
  @case ('confirm') {
  <div class="modal-content rounded-4 shadow">
    <div class="modal-header border-bottom-0">
      <span class=" text-center w-100">
        <h1 class="modal-title fs-5 ">{{ modalTitle }}</h1>
      </span>
    </div>
    <div class="modal-body py-0 text-center">
      <p>{{ modalMessage }}</p>
    </div>
    <div class="modal-footer flex-column w-100 gap-2 pb-3 border-top-0">
      <button type="button" class="btn btn-lg btn-primary w-100 fs-6 text-decoration-none m-0 rounded-1 border-right"
        (click)="onConfirm()" [disabled]="isLoading">
        <span *ngIf="!isLoading"><strong>{{modalConformMessage}}</strong></span>
        <span *ngIf="isLoading">
          <div class="spinner-border spinner-border-sm me-1" style="width: 1rem; height: 1rem;" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <span>Loading...</span>
        </span>
      </button>
      <button type="button" class="btn btn-lg w-100 btn-outline-primary fs-6 text-decoration-none m-0 rounded-1"
        (click)="onCancel()" [disabled]="isLoading">
        {{modalCancelMessage}}
      </button>
    </div>
  </div>
  }
  @default {
  <div class="modal-content rounded-4 shadow">
    <div class="modal-body p-4 text-center">
      <h5 class="mb-0 text-{{modalType}}">{{ modalTitle }}</h5>
      <p class="mb-0">{{ modalMessage }}</p>
    </div>
    <div class="modal-footer flex-column w-100 gap-2 pb-3 border-top-0">
      <button type="button" class="btn btn-lg btn-primary w-100 fs-6 text-decoration-none m-0 rounded-1 border-right"
        (click)="onConfirm()" [disabled]="isLoading">
        <span *ngIf="!isLoading"><strong>{{modalConformMessage}}</strong></span>
        <span *ngIf="isLoading">
          <div class="spinner-border spinner-border-sm me-1" style="width: 1rem; height: 1rem;" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <span>Loading...</span>
        </span>
      </button>
    </div>
  </div>
  }
  }
  
</ng-template>
