<ng-template #contentModal let-modal>
  @switch (modalType) {
  @case ('delete') {
  <div class="modal-content rounded-4 shadow">
    <div class="modal-body p-4 text-center">
      <h5 class="mb-0">{{ modalTitle }}</h5>
      <p class="mb-0">{{ modalMessage }}</p>
    </div>
    <div class="modal-footer flex-nowrap p-0">
      <button type="button" class="btn btn-lg btn-link fs-6 text-decoration-none col-6 m-0 rounded-0 border-right"
        (click)="onConfirm()" [disabled]="isLoading">
        <span *ngIf="!isLoading"><strong>{{modalConformMessage}}</strong></span>
        <span *ngIf="isLoading">
          <div class="spinner-border spinner-border-sm me-1" style="width: 1rem; height: 1rem;" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <span>Loading...</span>
        </span>
      </button>
      <button type="button" class="btn btn-lg btn-link fs-6 text-decoration-none col-6 m-0 rounded-0"
        (click)="onCancel()" [disabled]="isLoading">
        {{modalCancelMessage}}
      </button>
    </div>
  </div>
  }
  @case ('success' || 'error' || 'warning' || 'info' ) {
    
  }
  @case ('confirm') {
    <div class="modal-content rounded-4 shadow">
      <div class="modal-header border-bottom-0">
        <h1 class="modal-title fs-5">{{ modalTitle }}</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body py-0">
        <p>{{ modalMessage }}</p>
      </div>
      <div class="modal-footer flex-column align-items-stretch w-100 gap-2 pb-3 border-top-0">
        <button type="button" class="btn btn-lg btn-link fs-6 text-decoration-none col-6 m-0 rounded-0 border-right"
        (click)="onConfirm()" [disabled]="isLoading">
        <span *ngIf="!isLoading"><strong>{{modalConformMessage}}</strong></span>
        <span *ngIf="isLoading">
          <div class="spinner-border spinner-border-sm me-1" style="width: 1rem; height: 1rem;" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <span>Loading...</span>
        </span>
      </button>
      <button type="button" class="btn btn-lg btn-link fs-6 text-decoration-none col-6 m-0 rounded-0"
        (click)="onCancel()" [disabled]="isLoading">
        {{modalCancelMessage}}
      </button>
      </div>
    </div>
  }
  }
</ng-template>
