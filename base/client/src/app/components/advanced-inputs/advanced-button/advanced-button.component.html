<button class="btn btn-{{color}} btn-{{ size }} {{classes}}" [disabled]="isDisabled || isLoading" [type]="type" (click)="clickEvent()">
    <i *ngIf="" class="{{ icon }} me-2"></i>
    <span *ngIf="!isLoading">{{ label }}</span>
    <span *ngIf="isLoading">
        <div class="spinner-border spinner-border-sm me-1" style="width: 1rem; height: 1rem;" role="status">
            <span class="visually-hidden">{{loadingText}}</span>
        </div>
        <span role="status">{{loadingText}}</span>
    </span>
</button>
