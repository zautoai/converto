<!-- CONTAINER OPEN -->
<div class="container">
    <div class="row text-center mx-auto">
        <div class="col-lg-8 col-sm-12 center-block align-items-center construction  ">
            <div class="text-white">
                <div class="card-body">
                    <h2 class="display-2 mb-0 "><h2>Coming Soon</h2></h2>
                    <p class="tx-14 text-muted">We Will get back to U , Sorry For Your Inconvinence. Follow Us for More Updates!</p>
                    <div class="row row-sm mx-auto">
                      <div  id="count-down" class="is-countdown center-block d-flex justify-content-center">
                        <div class="clock-presenter days_dash">
                          <div class="digit">{{days}}</div>

                          <p class="mt-2 ms-4">Days</p>
                        </div>
                        <div class="clock-presenter hours_dash">
                          <div class="digit">{{hours}}</div>
                          <p class="mt-2 ms-4">Hours</p>
                        </div>
                        <div class="clock-presenter minutes_dash">
                          <div class="digit">{{minutes}}</div>
                          <p class="mt-2 ms-3">Minutes</p>
                        </div>
                        <div class="clock-presenter seconds_dash">
                          <div class="digit">{{seconds}}</div>
                          <p class="mt-2 ms-2">Seconds</p>
                        </div>
                      </div>

                  </div>

             
                    <div class="mt-5">
                        <button class="btn  btn-facebook me-1" type="button">
                            <span class="btn-inner--icon"><i class="fa fa-facebook-f"></i></span>
                        </button>
                        <button class="btn btn-google me-1" type="button">
                            <span class="btn-inner--icon"><i class="fa fa-google"></i></span>
                        </button>
                        <button class="btn  btn-twitter me-1" type="button">
                            <span class="btn-inner--icon"><i class="fa fa-twitter"></i></span>
                        </button>
                        <button class="btn  btn-pinterest me-1" type="button">
                            <span class="btn-inner--icon"><i class="fa fa-pinterest-p"></i></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- CONTAINER CLOSED -->
