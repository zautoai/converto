<div class="container-fluid">
    <div class="row vh-100 d-flex align-items-center justify-content-center">
      <div class="col-lg-3 col-md-6 col-sm-12">
        @if(errorMessage)
        {
          <div class="alert alert-danger text-center" role="alert">
            {{errorMessage}}
          </div>
        }
        <div class="w-100 d-flex align-items-center mb-3">
          <img src="../../../assets/images/brand/black_full_png.png" alt="" width="200" class="mx-auto">
        </div>
        <div class="card shadow-sm">
          <div class="card-body">
            <h3 class="text-center">Reset password</h3>
            <form [formGroup]="resetForm" (ngSubmit)="submit()">
                <div class="form-group mb-3">
                    <advanced-input [label]="'Password'" [type]="'password'" [placeholder]="'Your password'" [size]="'md'"
                      [control]="password" [isDisabled]="isLoading" [errorMessages]="errorMessages.password"></advanced-input>
                  </div>
                <div class="form-group mb-3">
                    <advanced-input [label]="'Confirm password'" [type]="'password'" [placeholder]="'Confirm password'" [size]="'md'"
                      [control]="confirm_password" [isDisabled]="isLoading" [errorMessages]="errorMessages.confirm_password"></advanced-input>
                </div>
                <advanced-button [label]="'Submit'" [size]="'md'" [classes]="'w-100'" [type]="'submit'"
                    [isLoading]="isLoading"></advanced-button>
                <div class="text-center pt-3">
                    <p class="mb-0">
                        <span class="text-muted">back to</span><a routerLink="/auth/login" class="text-primary ms-1">login</a>
                    </p>
                </div>
            </form>
          </div>
        </div>
    </div>  
</div>
