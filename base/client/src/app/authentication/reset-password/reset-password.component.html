<div class="login-img">
    <div class="page">
        <div class="">
            <div class="col col-login mx-auto mt-7">
                <div class="text-center">
                    <a routerLink="/zautodashboard"><img src="{{GLOBAL_IMAGES.zauto_logo_black}}"
                            class="header-brand-img m-0" alt=""></a>
                </div>
            </div>

            <div class="container-login100">
                <div class="wrap-login100 p-6">
                    <h3 class="login100-form-title">Reset password</h3>
                    <form class="login100-form validate-form" [formGroup]="resetForm" (ngSubmit)="submit()">
                        <div class="input-group mb-4">
                            <a href="javascript:void(0)" class="input-group-text bg-white text-muted">
                                <i class="zmdi zmdi-lock"></i>
                            </a>
                            <input type="password" class="form-control" tabindex="1" placeholder="New password" formControlName="password" autocomplete />
                        </div>
                        <div class="input-group mb-4">
                            <a href="javascript:void(0)" class="input-group-text bg-white text-muted">
                                <i class="zmdi zmdi-lock"></i>
                            </a>
                            <input type="password" class="form-control" tabindex="2" placeholder="Confirm password" formControlName="confirm_password" autocomplete />
                        </div>
                        <button [disabled]="isSubmitting" type="submit"
                            class="btn btn-md btn-primary btn-block" autofocus>
                            <ng-container *ngIf="!isSubmitting; else spinner">
                                <i class="zmdi zmdi-lock"></i> Reset
                            </ng-container>
                        </button>
                    </form>
                </div>
            </div> 
        </div>
    </div>
</div>

<ng-template #spinner>
    <div class="spinner-border text-light" role="status">
      <span class="visually-hidden" role="status">Loading...</span>
    </div>
</ng-template>
