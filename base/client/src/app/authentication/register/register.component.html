<!-- BACKGROUND-IMAGE -->
<div class="login-img">
  <div class="page">
    <div class="">
      <div class="col col-login mx-auto mt-7">
        <div class="text-center">
          <a routerLink="/zautodashboard"><img src="{{GLOBAL_IMAGES.zauto_logo_black}}" class="header-brand-img m-0"
              alt=""></a>
        </div>
      </div>
      <div class="container-login100">
        <div class="wrap-login100 p-6">
          <form [formGroup]="registrForm" (ngSubmit)="submit()" class="login100-form validate-form">
            <h3 class="text-center">
              Registration
            </h3>
            <div class="form-group mb-3">
              <advanced-input 
              [label]="'Name'"
              [type]="'text'"
              [placeholder]="'Your name'"
              [size]="'md'"
              [control]="name"
              [isDisabled]="isLoading"
              [errorMessages]="errorMessages.name"
              ></advanced-input>
            </div>
            <div class="form-group mb-3">
              <advanced-input 
              [label]="'Email'"
              [type]="'email'"
              [placeholder]="'Your email ID'"
              [size]="'md'"
              [control]="email"
              [isDisabled]="isLoading"
              [errorMessages]="errorMessages.email"
              ></advanced-input>
            </div>
            <div class="form-group mb-3">
              <advanced-input 
              [label]="'Password'"
              [type]="'password'"
              [placeholder]="'Your password'"
              [size]="'md'"
              [control]="password"
              [isDisabled]="isLoading"
              [errorMessages]="errorMessages.password"
              ></advanced-input>
            </div>
            <div class="form-group mb-3">
              <advanced-input 
              [label]="'Agree the terms and conditions'"
              [type]="'checkbox'"
              [size]="'md'"
              [control]="terms"
              [isDisabled]="isLoading"
              [errorMessages]="errorMessages.terms"
              ></advanced-input>
            </div>
            <advanced-button
            [label]="'Register'"
            [size]="'md'"
            [classes]="'w-100'"
            [type]="'submit'"
            [isLoading]="isLoading"
            ></advanced-button>
            <div class="text-center pt-3">
              <p class="text-dark mb-5"><span class="text-muted">Already have account?</span><a routerLink="/auth/login" class="text-primary ms-1">Login</a></p>
              <!-- <p><a routerLink="/auth/login" class="text-primary ms-1"> Send Magic Link</a></p> -->
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
