<!-- BACKGROUND-IMAGE -->
<div class="login-img">


  <!-- PAGE -->
  <div class="page">
    <div class="">
      <!-- Theme-Layout -->

      <!-- CONTAINER OPEN -->
      <div class="col col-login mx-auto mt-7">
        <div class="text-center">
          <a routerLink="/zautodashboard"><img src="{{GLOBAL_IMAGES.zauto_logo_black}}" class="header-brand-img m-0"
              alt=""></a>
        </div>
      </div>
      <div class="container-login100">
        <div class="wrap-login100 p-6">
          <form [formGroup]="registrationForm" class="login100-form validate-form">
            <span class="login100-form-title">
              Registration
            </span>
            <div class="wrap-input100 validate-input input-group"
              data-bs-validate="Valid email is required: ex@abc.xyz">
              <a href="javascript:void(0)" class="input-group-text bg-white text-muted">
                <i class="zmdi zmdi-email" aria-hidden="true"></i>
              </a>
              <input class=" border-start-0 ms-0 form-control" tabindex="1" formControlName="email" type="email" name="email"
                required placeholder="Enter email Id">
            </div>
            <div class="wrap-input100 validate-input input-group" id="Password-toggle">
              <a role="btn" class="input-group-text bg-white text-muted btn-password"  (click)="togglePassword('password', 'zmdi-eye', 'zmdi-eye-off')">
                <i class="zmdi zmdi-eye"></i>
              </a>
              <input class=" border-start-0 ms-0 form-control" tabindex="2" formControlName="password" name="password" id="password"
              [type]="'password'" required placeholder="Enter Password">
            </div>

            <div *ngIf="errorMessage" class="form-group">
              <p *ngIf="errorMessage.length > 0" class="text-danger">
                {{errorMessage}}</p>

              <p *ngIf="error.message && error.message.length > 0" class="text-danger">
                {{error.message}} </p>

              <p *ngIf="message && message.length > 0" class="text-info">
                {{message}} </p>
            </div>
            <label class="custom-control custom-checkbox mt-4">
              <input type="checkbox" class="custom-control-input" (click)="toggleAgreeTerms()">
              <span class="custom-control-label">Agree the <a href="https://zauto.ai/terms.html" target="_blank">terms and policy</a></span>
            </label>
            <div class="container-login100-form-btn">
              <button [disabled]="isSubmitting" class="btn btn-primary btn-block" (click)="submit()">
                <ng-container *ngIf="!isSubmitting; else spinner">
                  Register
                </ng-container>
              </button>
            </div>
            <div class="text-center pt-3">
              <p class="text-dark mb-5">Already have account?<a routerLink="/auth/login" class="text-primary ms-1">Sign
                  In</a></p>
              <!-- <p><a routerLink="/auth/login" class="text-primary ms-1"> Send Magic Link</a></p> -->
            </div>


          </form>
        </div>
      </div>
      <!-- CONTAINER CLOSED -->
      <ng-template ngbNavContent>
        <form (ngSubmit)="submit()">
          <div class="text-center title-style mb-6">
            <h1 class="mb-2">Login</h1>
            <hr>
            <p class="text-muted">Sign In to your account</p>
          </div>

          <div class="input-group mb-3">
            <a href="javascript:void(0)" class="input-group-text bg-white text-muted">
              <i class="zmdi zmdi-email text-muted" aria-hidden="true"></i>
            </a>
            <input type="text" class="input100 border-start-0 form-control ms-0" placeholder="Username" autocomplete
              formControlName="username">
          </div>
          <div class="input-group mb-4">
            <a href="javascript:void(0)" class="input-group-text bg-white text-muted">
              <i class="zmdi zmdi-eye text-muted" aria-hidden="true"></i>
            </a>
            <input type="password" class="input100 border-start-0 form-control ms-0" placeholder="Password" autocomplete
              formControlName="password">
          </div>
          {{error}}
          <div class="row">
            <div class="col-12">
              <button [disabled]="!registrationForm.valid" type="submit"
                class="btn btn-lg btn-primary btn-block {{disabled}}">Login</button>
            </div>
            <div class="col-12">
              <a routerLink="/custom-pages/forget-password/forget-password01"
                class="btn btn-link box-shadow-0 px-0">Forgot password?</a>
            </div>
          </div>
          <div class="text-center pt-3">
            <p class="text-dark mb-0">
              Not a member?<a routerLink="/auth/register" class="text-primary ms-1">Sign UP</a>
            </p>
          </div>
          <label class="login-social-icon"><span>Login with Social</span></label>
          <div class="d-flex justify-content-center">
            <a href="https://www.google.com/gmail/">
              <div class="social-login me-4 text-center">
                <i class="fa fa-google"></i>
              </div>
            </a>
            <a href="https://www.facebook.com/">
              <div class="social-login me-4 text-center">
                <i class="fa fa-facebook"></i>
              </div>
            </a>
            <a href="https://twitter.com/">
              <div class="social-login text-center">
                <i class="fa fa-twitter"></i>
              </div>
            </a>
          </div>
        </form>
      </ng-template>
    </div>
  </div>
  <!-- END PAGE -->

</div>
<!-- BACKGROUND-IMAGE CLOSED -->

<ng-template #spinner>
  <div class="spinner-border text-light" role="status">
    <span class="visually-hidden" role="status">Loading...</span>
  </div>
</ng-template>
