<div class="login-img">
    <div class="page">
        <div class="">
            <div class="col col-login mx-auto mt-7">
                <div class="text-center">
                    <a routerLink="/zautodashboard"><img src="{{GLOBAL_IMAGES.zauto_logo_black}}"
                            class="header-brand-img m-0" alt=""></a>
                </div>
            </div>

            <div class="container-login100">
                <div class="wrap-login100 p-6">
                    <form class="login100-form validate-form" [formGroup]="resetForm" (ngSubmit)="submit()">
                        <h3 class="login100-form-title">Forgot password</h3>
                        <p class="text-center fw-light">Enter the email address associated with your account and we'll send you a link to reset your password.</p>
                        <div class="input-group mb-4">
                            <a href="javascript:void(0)" class="input-group-text bg-white text-muted">
                                <i class="zmdi zmdi-email text-muted" aria-hidden="true"></i>
                            </a>
                            <input type="text" class="form-control" placeholder="Email" formControlName="email" />
                        </div>
                        <button [disabled]="isSubmitting" type="submit"
                            class="btn btn-md btn-primary btn-block" autofocus>
                            <ng-container *ngIf="!isSubmitting; else spinner">
                                <i class="zmdi zmdi-email"></i> Send
                            </ng-container>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #spinner>
    <div class="spinner-border text-light" role="status">
      <span class="visually-hidden" role="status">Loading...</span>
    </div>
</ng-template>
