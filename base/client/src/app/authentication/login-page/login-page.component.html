<!-- BACKGROUND-IMAGE -->
<div class="login-img">


  <!-- PAGE -->
  <div class="page">
    <div class="">
      <!-- Theme-Layout -->

      <!-- CONTAINER OPEN -->
      <div class="col col-login mx-auto mt-7">
        <div class="text-center">
          <a routerLink="/zautodashboard"><img src="{{GLOBAL_IMAGES.zauto_logo_black}}" class="header-brand-img m-0"
              alt=""></a>
        </div>
      </div>
      <div class="container-login100">
        <div class="wrap-login100 p-6">
          <form [formGroup]="loginForm" (ngSubmit)="Submit()" class="login100-form validate-form">
            <h3 class="login100-form-title">Login</h3>
            <div class="wrap-input100 validate-input input-group">
              <a href="javascript:void(0)" class="input-group-text bg-white text-muted">
                <i class="zmdi zmdi-email text-muted" aria-hidden="true"></i>
              </a>
              <input type="text" class="form-control" tabindex="1" placeholder="Email" autocomplete
                formControlName="username" />
            </div>
            <div class="input-group mb-4">
              <a role="btn" class=" btn input-group-text bg-white text-muted btn-password" (click)="togglePassword('password', 'zmdi-eye', 'zmdi-eye-off')">
                <i class="zmdi zmdi-eye-off text-muted" aria-hidden="true"></i>
              </a>
              <input [type]="'password'" tabindex="2" class="form-control"
                placeholder="Password" autocomplete formControlName="password" id="password" />
            </div>
          
          
            <button [disabled]="isSubmitting" type="submit"
              class="btn btn-md btn-primary btn-block" autofocus>
              <ng-container *ngIf="!isSubmitting; else spinner">
                Login
              </ng-container>
            </button>
            <div class="text-center pt-3">
              <p class="text-dark mb-0">
                Not a member?<a routerLink="/auth/register" class="text-primary ms-1">Sign UP</a>
              </p>
            </div>
            <div class="text-center pt-3">
              <p class="text-dark mb-0">
                <a routerLink="/auth/forgot-password" class="text-primary ms-1">Forgot password</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <!-- END PAGE -->

</div>
<!-- BACKGROUND-IMAGE CLOSED -->

<ng-template #spinner>
  <div class="spinner-border text-light" role="status">
    <span class="visually-hidden" role="status">Loading...</span>
  </div>
</ng-template>
