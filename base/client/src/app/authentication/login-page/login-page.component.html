
<div class="container-fluid">
  <div class="row vh-100 d-flex align-items-center justify-content-center">
    <div class="col-lg-3 col-md-6 col-sm-12">
      @if(errorMessage)
      {
        <div class="alert alert-danger text-center" role="alert">
          {{errorMessage}}
        </div>
      }
      <div class="card shadow-sm">
        <div class="card-body">
          <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="">
            <h3 class="text-center">Login</h3>
            <div class="form-group mb-3">
              <advanced-input [label]="'Email'" [type]="'email'" [placeholder]="'Your email ID'" [size]="'md'"
                [control]="email" [isDisabled]="isLoading" [errorMessages]="errorMessages.email"></advanced-input>
            </div>
            <div class="form-group mb-3">
              <advanced-input [label]="'Password'" [type]="'password'" [placeholder]="'Your password'" [size]="'md'"
                [control]="password" [isDisabled]="isLoading" [errorMessages]="errorMessages.password"></advanced-input>
            </div>
            <div class="mb-3 text-end">
              <a routerLink="/auth/forgot-password" class="text-primary ms-1">Forgot password?</a>
            </div>
            <advanced-button [label]="'Login'" [size]="'md'" [classes]="'w-100'" [type]="'submit'"
              [isLoading]="isLoading"></advanced-button>
            <div class="text-center pt-3">
              <p class="mb-0">
                <span class="text-muted">Not a member?</span><a routerLink="/auth/register" class="text-primary ms-1">Register</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<app-advanced-modals #errorModal [modalType]="'danger'" [modalTitle]="'Auth error'"
  [modalMessage]="'Are you sure you want to delete this contact?'" [modalConformMessage]="'Yes'"
  [modalCancelMessage]="'No'"></app-advanced-modals>

<app-advanced-modals #accountVerificationModal [modalType]="'danger'" [modalTitle]="'Auth error'"
  [modalMessage]="'Are you sure you want to delete this contact?'" [modalConformMessage]="'Yes'"
  [modalCancelMessage]="'No'" (cancel)="onVerifySubmit($event)"></app-advanced-modals>
