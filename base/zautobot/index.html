
<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="../assets/images/brand/Fav_icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zauto AI</title>

    <style>
        body {
            background-image: url("./assets/ai-bg.webp");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>

<body>

    <script type="text/javascript">        
        (function () { var rootElement = document.createElement("div"); 
        const currentURL = window.location.href;
        const url = new URL(currentURL);
        const searchParams = url.searchParams;
        const botId = searchParams.get('botid');
        if(botId)
        {
            rootElement.id = "zauto_root"; 
            document.body.appendChild(rootElement); 
            d = document; 
            s = d.createElement("script"); 
            s.async = 1; 
            // s.src = "zauto.js";
            s.src = `/api/agents/widget/standalone/${botId}.js`;
            d.getElementsByTagName("head")[0].appendChild(s); 
        }
        })();
    </script>
</body>

</html>
