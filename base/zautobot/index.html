
<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="../assets/images/brand/Fav_icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zauto AI</title>

    <style>
        body {
            background-image: url("./assets/ai-bg.webp");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>

<body>

    <script type="text/javascript">
        (function () {
            var rootElement = document.createElement("div");
            const currentURL = window.location.href;
            const url = new URL(currentURL);
            const searchParams = url.searchParams;
            const botId = searchParams.get('botid');
            const tenantId = url.hostname.split('.')[0]; // Assuming subdomain is the tenant ID

            if (botId) {
                rootElement.id = "zauto_root";
                document.body.appendChild(rootElement);

                fetch(`https://${url.host}/api/agents/widget/standalone/${botId}.js`, {
                    headers: {
                        'x-tenant-id': tenantId
                    }
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok ' + response.statusText);
                    }
                    return response.text();
                })
                .then(scriptContent => {
                    var s = document.createElement("script");
                    s.async = 1;
                    s.text = scriptContent;
                    document.getElementsByTagName("head")[0].appendChild(s);
                })
                .catch(error => {
                    console.error('There has been a problem with your fetch operation:', error);
                });
            }
        })();
    </script>
    
</body>


</html>
